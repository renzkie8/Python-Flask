name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t flask-app .

  deploy:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/azureuser/Python-Flask
            git pull origin main
            source /home/azureuser/Python-Flask/venv/bin/activate
            pip install -r requirements.txt
            sudo tee /etc/systemd/system/flaskapp.service > /dev/null <<EOF
            [Unit]
            Description=Flask App
            After=network.target

            [Service]
            User=azureuser
            WorkingDirectory=/home/azureuser/Python-Flask
            ExecStart=/home/azureuser/Python-Flask/venv/bin/python3 app.py
            Restart=always

            [Install]
            WantedBy=multi-user.target
            EOF
            sudo systemctl daemon-reload
            sudo systemctl restart flaskapp
            sudo systemctl enable flaskapp
            echo "Deploy done!"